name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/**"

  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/**"

  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Compilar i executar tests
        run: mvn clean test